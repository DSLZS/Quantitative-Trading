# ==============================================================================
# Factor Configuration - Version 1.9 (Compatible with Hardcoded Volume Entropy)
# ==============================================================================

factors:
  # --- 基础动量 ---
  - name: momentum_5
    expression: "close / close.shift(5) - 1"
    window: 5
  - name: momentum_10
    expression: "close / close.shift(10) - 1"
    window: 10

  # --- 基础波动 ---
  - name: volatility_20
    expression: "close.rolling_std(window_size=20)"
    window: 20

  # --- 量价增强 (修正逻辑) ---
  - name: volume_ma_ratio_5
    expression: "volume / (volume.rolling_mean(window_size=5) + 1e-10)"
    window: 5

  - name: amplitude_turnover_ratio_20
    description: "振幅/换手比率"
    expression: "((high - low) / (close + 1e-10)) / ((volume.fill_null(0) + 1e-10) / (volume.fill_null(0).rolling_mean(window_size=20) + 1e-10))"
    window: 20

  # 【修复 - Iteration 19】tail_volume_price_corr_20 表达式优化
  # 原始问题：当某天成交量为 0 或标准差接近 0 时会产生 NaN
  # 修复方案：
  # 1. 使用 fill_null(0) 填充缺失的成交量
  # 2. 在分母中添加足够大的 epsilon (1e-6) 避免除零
  # 3. 使用 clip 限制输出范围，避免极端值
  - name: tail_volume_price_corr_20
    description: "量价相关性 (修复 NaN 问题)"
    expression: "((pct_chg.fill_null(0) - pct_chg.fill_null(0).rolling_mean(window_size=20)) * (volume.fill_null(0) - volume.fill_null(0).rolling_mean(window_size=20))).rolling_sum(window_size=20) / (20 * (pct_chg.fill_null(0).rolling_std(window_size=20) + 1e-6) * (volume.fill_null(0).rolling_std(window_size=20) + 1e-6) + 1e-6)"
    window: 20

label:
  name: sharpe_label
  expression: "close.shift(-5) / close - 1"
  window: 5